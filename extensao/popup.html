<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
  body { width: 400px; background: #0f172a; color: #f1f5f9; }

  .header { background: #ee4d2d; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
  .header span { font-size: 11px; color: #fcd34d; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 10px; }

  .body { padding: 16px; }

  .shop-detected { background: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 14px; font-size: 12px; color: #94a3b8; }
  .shop-detected strong { color: #f1f5f9; font-size: 13px; display: block; margin-bottom: 2px; }

  .btn { width: 100%; padding: 12px; background: #ee4d2d; color: #fff; font-size: 14px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: background .2s; }
  .btn:hover { background: #d63d1e; }
  .btn:disabled { background: #475569; cursor: not-allowed; }

  .loading { text-align: center; padding: 24px; color: #94a3b8; font-size: 13px; }
  .spinner { width: 28px; height: 28px; border: 3px solid #334155; border-top-color: #ee4d2d; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { background: #450a0a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 12px; color: #fca5a5; font-size: 13px; margin-top: 12px; }

  .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .kpi { background: #1e293b; border-radius: 8px; padding: 10px 12px; }
  .kpi-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: .5px; }
  .kpi-value { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-top: 2px; }
  .kpi-value.green { color: #4ade80; }
  .kpi-value.orange { color: #fb923c; }

  .section-title { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }

  .product-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; margin-bottom: 14px; }
  .product-item { background: #1e293b; border-radius: 6px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .product-name { font-size: 12px; color: #cbd5e1; flex: 1; line-height: 1.3; }
  .product-stats { text-align: right; flex-shrink: 0; }
  .product-price { font-size: 13px; font-weight: 700; color: #f1f5f9; }
  .product-sold { font-size: 11px; color: #4ade80; }
  .product-fat { font-size: 11px; color: #94a3b8; }

  .insights { display: flex; flex-direction: column; gap: 6px; }
  .insight { border-radius: 6px; padding: 10px 12px; font-size: 12px; }
  .insight-title { font-weight: 700; margin-bottom: 2px; }
  .insight-desc { color: #94a3b8; line-height: 1.4; }
  .insight.positivo { background: #052e16; border-left: 3px solid #4ade80; }
  .insight.positivo .insight-title { color: #4ade80; }
  .insight.atencao { background: #1c1917; border-left: 3px solid #fb923c; }
  .insight.atencao .insight-title { color: #fb923c; }
  .insight.info { background: #0f172a; border-left: 3px solid #60a5fa; }
  .insight.info .insight-title { color: #60a5fa; }

  .warning { background: #1c1400; border: 1px solid #78350f; border-radius: 8px; padding: 12px; color: #fbbf24; font-size: 12px; line-height: 1.5; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
</style>
</head>
<body>
<div class="header">
  <h1>🔍 Análise de Loja</h1>
  <span>Acelera Shopee</span>
</div>
<div class="body" id="root"></div>
<script src="popup.js"></script>
</body>
</html>
